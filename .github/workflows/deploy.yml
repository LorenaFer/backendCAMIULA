name: CD — Deploy to Railway (development)

# Railway auto-deploys from GitHub natively.
# This workflow only triggers a deploy via Railway API webhook
# after CI passes (as a safety gate).

on:
  workflow_run:
    workflows: ["CI — Lint & Test"]
    types: [completed]
    branches: [development]

jobs:
  deploy:
    name: Trigger Railway Deploy
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'development'

    steps:
      - name: Trigger Railway redeploy
        run: |
          if [ -z "${{ secrets.RAILWAY_WEBHOOK_URL }}" ]; then
            echo "Railway webhook not configured. Enable auto-deploy in Railway dashboard instead."
            echo "Go to: Railway > Service > Settings > Source > Enable 'Auto Deploy'"
            exit 0
          fi
          curl -X POST "${{ secrets.RAILWAY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail --silent --show-error
          echo "Railway deploy triggered successfully"
