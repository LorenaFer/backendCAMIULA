name: 🚀 Deploy Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Quality gates corren en cada PR — nunca llega código roto a main
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del deploy manual"
        required: false
        default: "Deploy manual"
      run_migrations:
        description: "Correr migraciones Alembic"
        type: boolean
        default: true

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

# Opt-in a Node.js 24 para actions (checkout, setup-python, etc.)
# Evita el warning de deprecación de Node 20 — obligatorio desde junio 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────
# JOB 1: Quality Gates
# Corre en push a main Y en pull_request → main.
# Bloquea el deploy si algo falla:
#   · Estándares de migraciones DB  (validate_migrations.py)
#   · Arquitectura Clean Architecture  (validate_architecture.py)
#   · Unit tests  (sin base de datos — rápidos, siempre corren)
#   · Integration tests (con PostgreSQL de servicio + seed de CI)
# ─────────────────────────────────────────────────────────────
jobs:
  quality-gates:
    name: "🔍 Quality Gates"
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: camiula_ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: camiula_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt pytest-cov

      # ── Gate 1: DB Standards ────────────────────────────────
      - name: "🗄️  Validar estándares de migraciones DB"
        run: python scripts/validate_migrations.py
        # Verifica upgrade/downgrade no vacíos, orden de columnas,
        # NOT NULL sin server_default, y no drop/alter sobre audit cols.

      # ── Gate 2: Architecture Standards ──────────────────────
      - name: "🏛️  Validar arquitectura Clean Architecture"
        run: python scripts/validate_architecture.py
        # Verifica:
        #   · Reglas de dependencias entre capas (domain→app→infra→presentation)
        #   · Convenciones de nomenclatura de archivos y clases
        #   · Patrón Repository (interfaz + implementación SQLAlchemy)
        #   · Patrón Use Case (execute/__call__ + __init__)
        #   · Importaciones cross-module solo desde presentation
        # Las exempciones documentadas (deuda técnica + cross-cutting) no bloquean.

      # ── Gate 3: Unit Tests (sin DB, rápidos) ────────────────
      - name: "🧪 Unit tests"
        env:
          DATABASE_URL: "postgresql+asyncpg://camiula_ci:ci_password@localhost:5432/camiula_ci"
          SECRET_KEY: "ci-secret-key-not-for-production"
          DEBUG: "true"
          AUTH_PROVIDER: local
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            -q \
            --no-header

      # ── Gate 4: Integration Tests (con DB real) ─────────────
      - name: "🔗 Aplicar migraciones en DB de CI"
        env:
          DATABASE_URL: "postgresql+asyncpg://camiula_ci:ci_password@localhost:5432/camiula_ci"
        run: alembic upgrade head

      - name: "🔗 Sembrar datos mínimos de CI"
        env:
          DATABASE_URL: "postgresql+asyncpg://camiula_ci:ci_password@localhost:5432/camiula_ci"
        run: python scripts/seed_ci.py
        # Crea roles (admin, analista, doctor, paciente) y usuarios de test
        # con emails @camiula.com que necesitan los integration tests.
        # Idempotente — seguro de correr varias veces.

      - name: "🔗 Integration tests"
        env:
          DATABASE_URL: "postgresql+asyncpg://camiula_ci:ci_password@localhost:5432/camiula_ci"
          SECRET_KEY: "ci-secret-key-not-for-production"
          DEBUG: "true"
          AUTH_PROVIDER: local
        run: |
          pytest tests/integration/ tests/test_health.py \
            -v \
            --tb=short \
            -q \
            --no-header \
            --timeout=30

# ─────────────────────────────────────────────────────────────
# JOB 2: Deploy  (solo en push a main o workflow_dispatch)
# Los PRs solo corren quality-gates, nunca despliegan.
# ─────────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy API a camiula.net"
    needs: quality-gates
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sincronizar archivos al VPS (rsync)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env*' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='*.egg-info' \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/camiula/camiula/backendCAMIULA/

      - name: Reconstruir y reiniciar contenedor backend
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'cd /home/camiula/camiula && \
             docker compose -f docker-compose.prod.yml --env-file .env.prod \
               up -d --build --force-recreate --no-deps backend 2>&1'

      - name: Ejecutar migraciones Alembic
        if: ${{ github.event_name == 'push' || inputs.run_migrations == 'true' }}
        run: |
          sleep 8
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'docker exec camiula-api alembic upgrade head 2>&1'

      - name: Verificar que el backend responde
        run: |
          sleep 5
          STATUS=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "docker inspect camiula-api --format '{{.State.Status}}'")
          echo "Container status: $STATUS"
          [ "$STATUS" = "running" ] || (echo "❌ Contenedor no está running" && exit 1)
          echo "✅ Backend desplegado correctamente"
